<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Bảng Xếp Hạng Âm Nhạc & OST Châu Á</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #1DB954; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #b3b3b3; margin-bottom: 25px; font-size: 14px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: #b3b3b3; letter-spacing: 1px; margin: 15px 0 5px 5px; font-weight: bold; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 5px; background: #181818; border-radius: 8px; }
        .tab-btn { background: transparent; color: #b3b3b3; border: none; padding: 10px 18px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: all 0.2s; }
        .tab-btn:hover { color: #fff; background: #282828; }
        .tab-btn.active { background: #1DB954; color: white; }
        .music-layout { display: flex; gap: 20px; }
        .song-list { flex: 1.2; background: #181818; padding: 15px; border-radius: 8px; max-height: 550px; overflow-y: auto; }
        .lyric-box { flex: 1; background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #282828; white-space: pre-line; max-height: 550px; overflow-y: auto; font-size: 15px; line-height: 1.7; color: #e5e5e5; }
        .song-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #232323; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
        .song-item:hover { background: #282828; }
        .rank { font-size: 16px; font-weight: bold; margin-right: 15px; color: #1DB954; width: 25px; text-align: center; }
        .song-info { flex: 1; }
        .title { font-weight: bold; font-size: 15px; margin-bottom: 2px; color: #fff; }
        .artist { font-size: 13px; color: #b3b3b3; }
        .movie-tag { font-size: 11px; background: #333; color: #1DB954; padding: 2px 6px; border-radius: 4px; margin-left: 8px; display: inline-block; font-weight: bold; }
        
        /* Cải tiến khu vực Player đa nền tảng */
        #player-container { margin-top: 25px; background: #181818; padding: 20px; border-radius: 8px; border-top: 2px solid #1DB954; text-align: center; }
        #player-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; color: #fff; }
        .platform-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .platform-btn { border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #fff; font-size: 13px; }
        .btn-youtube { background: #ff0000; }
        .btn-spotify { background: #1db954; }
        .btn-soundcloud { background: #ff5500; }
        .platform-btn.inactive { opacity: 0.4; }
        .player-frame { border: none; width: 100%; height: 160px; border-radius: 8px; background: #000; display: none; }
        .player-frame.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trending & OST Audio Stream</h1>
        <div class="subtitle">Cập nhật tự động • Đa nền tảng • Lời gốc Quốc Gia không dịch</div>
        
        <div class="section-title">Bảng Xếp Hạng Bài Hát (Top 10)</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('KR_HOT')">🇰🇷 Hàn Quốc (Melon)</button>
            <button class="tab-btn" onclick="switchTab('JP_HOT')">🇯🇵 Nhật Bản (Billboard)</button>
            <button class="tab-btn" onclick="switchTab('CN_HOT')">🇨🇳 Trung Quốc (QQ Music)</button>
        </div>

        <div class="section-title">Nhạc Phim Đang Hot (Top 10 OST)</div>
        <div class="tabs">
            <button class="tab-btn" onclick="switchTab('KR_OST')">🇰🇷 OST Hàn Quốc</button>
            <button class="tab-btn" onclick="switchTab('JP_OST')">🇯🇵 OST Nhật Bản</button>
            <button class="tab-btn" onclick="switchTab('CN_OST')">🇨🇳 OST Trung Quốc</button>
        </div>

        <div class="music-layout">
            <div class="song-list" id="song-list">Đang tải danh sách bài hát...</div>
            <div class="lyric-box" id="lyric-box">Chọn một bài hát từ Top 10 để phát nhạc và xem Lyric gốc bản địa...</div>
        </div>

        <div id="player-container">
            <div id="player-title">Đang phát: Chưa chọn bài hát</div>
            <div class="platform-tabs">
                <button id="btn-yt" class="platform-btn btn-youtube inactive" onclick="changePlatform('youtube')">📺 YouTube Video</button>
                <button id="btn-sp" class="platform-btn btn-spotify inactive" onclick="changePlatform('spotify')">🎵 Spotify Audio</button>
                <button id="btn-sc" class="platform-btn btn-soundcloud inactive" onclick="changePlatform('soundcloud')">☁️ SoundCloud</button>
            </div>
            <iframe id="player-youtube" class="player-frame" src="" allow="autoplay"></iframe>
            <iframe id="player-spotify" class="player-frame" src="" allow="encrypted-media"></iframe>
            <iframe id="player-soundcloud" class="player-frame" src=""></iframe>
        </div>
    </div>

    <script>
        let musicDatabase = {};
        let currentSong = { title: '', artist: '' };

        function initSystem() {
            fetch('./live-data.json')
                .then(res => res.json())
                .then(data => {
                    musicDatabase = data;
                    renderSongs(musicDatabase['KR_HOT']);
                })
                .catch(() => {
                    document.getElementById('song-list').innerText = "Hệ thống đang đồng bộ dữ liệu lần đầu...";
                });
        }

        function switchTab(targetKey) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(musicDatabase[targetKey]) { renderSongs(musicDatabase[targetKey]); }
        }

        function renderSongs(songs) {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            songs.forEach(song => {
                const item = document.createElement('div');
                item.className = 'song-item';
                item.onclick = () => selectSong(song.title, song.artist, song.songId);
                const movieBadge = song.movie ? `<span class="movie-tag">🎬 Phim: ${song.movie}</span>` : '';
                item.innerHTML = `<div class="rank">${song.rank}</div><div class="song-info"><div class="title">${song.title}</div><div class="artist">${song.artist} ${movieBadge}</div></div>`;
                listContainer.appendChild(item);
            });
        }

        // Hàm xử lý khi click chọn bài hát
        function selectSong(title, artist, songId) {
            currentSong = { title, artist };
            document.getElementById('player-title').innerText = `Đang phát: ${title} - ${artist}`;
            
            // 1. Cấu hình tự tìm kiếm và phát link gốc từ YouTube (Mở rộng chiều cao khung thành video)
            const searchKeyword = encodeURIComponent(title + " " + artist + " official mv");
            const ytPlayer = document.getElementById('player-youtube');
            ytPlayer.src = `https://www.youtube.com/embed?listType=search&list=${searchKeyword}&autoplay=1`;
            
            // 2. Tự động liên kết tìm kiếm nhúng của Spotify công khai
            const spotifyPlayer = document.getElementById('player-spotify');
            spotifyPlayer.src = `https://open.spotify.com/embed/search/${encodeURIComponent(title + " " + artist)}`;

            // 3. Tự động liên kết tìm kiếm nhúng của SoundCloud
            const soundcloudPlayer = document.getElementById('player-soundcloud');
            soundcloudPlayer.src = `https://w.soundcloud.com/player/?url=https://soundcloud.com/search/sounds?q=${encodeURIComponent(title + " " + artist)}&auto_play=true&visual=false&show_artwork=false`;

            // Mặc định ưu tiên phát ngay trình phát YouTube video theo ý bạn
            changePlatform('youtube');

            // Tải lyric chữ gốc từ NetEase
            loadLyric(title, artist, songId);
        }

        // Hàm chuyển đổi qua lại giữa các nền tảng nghe nhạc công khai
        function changePlatform(platform) {
            document.querySelectorAll('.player-frame').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.add('inactive'));

            if(platform === 'youtube') {
                document.getElementById('player-youtube').classList.add('active');
                document.getElementById('btn-yt').classList.remove('inactive');
            } else if(platform === 'spotify') {
                document.getElementById('player-spotify').classList.add('active');
                document.getElementById('btn-sp').classList.remove('inactive');
            } else if(platform === 'soundcloud') {
                document.getElementById('player-soundcloud').classList.add('active');
                document.getElementById('btn-sc').classList.remove('inactive');
            }
        }

        function loadLyric(title, artist, songId) {
            const lyricBox = document.getElementById('lyric-box');
            lyricBox.innerText = "Đang tải lyric gốc quốc gia...";
            
            const targetId = songId || '';
            if(!targetId) {
                fetch(`https://music.163.com/api/search/get/web?s=${encodeURIComponent(title + ' ' + artist)}&type=1&limit=1`)
                    .then(r => r.json())
                    .then(d => {
                        if(d.result && d.result.songs) { fetchLyricApi(d.result.songs[0].id); }
                        else { lyricBox.innerText = "Không tìm thấy lyric gốc."; }
                    });
            } else { fetchLyricApi(targetId); }
        }

        function fetchLyricApi(id) {
            const lyricBox = document.getElementById('lyric-box');
            fetch(`https://music.163.com/api/song/lyric?os=pc&id=${id}&lv=-1`)
                .then(res => res.json())
                .then(data => {
                    if(data.lrc && data.lrc.lyric) {
                        lyricBox.innerText = data.lrc.lyric.replace(/\[.*?\]/g, '').trim();
                    } else { lyricBox.innerText = "Chưa có file lyric gốc."; }
                }).catch(() => { lyricBox.innerText = "Lỗi kết nối tải lyric."; });
        }

        initSystem();
    </script>
</body>
</html>
