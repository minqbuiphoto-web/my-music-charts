<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Bảng Xếp Hạng Âm Nhạc & OST Châu Á</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #1DB954; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #b3b3b3; margin-bottom: 25px; font-size: 14px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: #b3b3b3; letter-spacing: 1px; margin: 15px 0 5px 5px; font-weight: bold; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 5px; background: #181818; border-radius: 8px; }
        .tab-btn { background: transparent; color: #b3b3b3; border: none; padding: 10px 18px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: all 0.2s; }
        .tab-btn:hover { color: #fff; background: #282828; }
        .tab-btn.active { background: #1DB954; color: white; }
        .music-layout { display: flex; gap: 20px; }
        .song-list { flex: 1.2; background: #181818; padding: 15px; border-radius: 8px; max-height: 550px; overflow-y: auto; }
        .lyric-box { flex: 1; background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #282828; white-space: pre-line; max-height: 550px; overflow-y: auto; font-size: 15px; line-height: 1.7; color: #e5e5e5; }
        .song-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #232323; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
        .song-item:hover { background: #282828; }
        .rank { font-size: 16px; font-weight: bold; margin-right: 15px; color: #1DB954; width: 25px; text-align: center; }
        .song-info { flex: 1; }
        .title { font-weight: bold; font-size: 15px; margin-bottom: 2px; color: #fff; }
        .artist { font-size: 13px; color: #b3b3b3; }
        .movie-tag { font-size: 11px; background: #333; color: #1DB954; padding: 2px 6px; border-radius: 4px; margin-left: 8px; display: inline-block; font-weight: bold; }
        #player-container { margin-top: 25px; background: #181818; padding: 20px; border-radius: 8px; border-top: 2px solid #1DB954; text-align: center; }
        #player-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; color: #fff; }
        iframe { border: none; width: 100%; height: 350px; border-radius: 8px; background: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trending & OST Audio Stream</h1>
        <div class="subtitle">Cập nhật tự động liên tục • Lời gốc Quốc Gia không dịch</div>
        
        <div class="section-title">Bảng Xếp Hạng Bài Hát (Top 10)</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('KR_HOT')">🇰🇷 Hàn Quốc (Melon)</button>
            <button class="tab-btn" onclick="switchTab('JP_HOT')">🇯🇵 Nhật Bản (Billboard)</button>
            <button class="tab-btn" onclick="switchTab('CN_HOT')">🇨🇳 Trung Quốc (QQ Music)</button>
        </div>

        <div class="section-title">Nhạc Phim Đang Hot (Top 10 OST)</div>
        <div class="tabs">
            <button class="tab-btn" onclick="switchTab('KR_OST')">🇰🇷 OST Hàn Quốc</button>
            <button class="tab-btn" onclick="switchTab('JP_OST')">🇯🇵 OST Nhật Bản</button>
            <button class="tab-btn" onclick="switchTab('CN_OST')">🇨🇳 OST Trung Quốc</button>
        </div>

        <div class="music-layout">
            <div class="song-list" id="song-list">Đang tải danh sách bài hát...</div>
            <div class="lyric-box" id="lyric-box">Chọn một bài hát từ Top 10 để phát nhạc trên YouTube và xem Lyric gốc bản địa...</div>
        </div>

        <div id="player-container">
            <div id="player-title">Đang phát: Chưa chọn bài hát</div>
            <iframe id="player-youtube" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        let musicDatabase = {};

        function initSystem() {
            // Thêm mã lệnh phá cache (?t=...) ép trình duyệt luôn lấy dữ liệu mới nhất mà robot vừa cập nhật
            fetch('./live-data.json?t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    musicDatabase = data;
                    renderSongs(musicDatabase['KR_HOT']);
                })
                .catch(() => {
                    document.getElementById('song-list').innerText = "Vui lòng chạy lại Actions trên GitHub để hoàn tất đồng bộ...";
                });
        }

        function switchTab(targetKey) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(musicDatabase[targetKey]) { renderSongs(musicDatabase[targetKey]); }
        }

        function renderSongs(songs) {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            songs.forEach(song => {
                const item = document.createElement('div');
                item.className = 'song-item';
                item.onclick = () => playSong(song.title, song.artist);
                const movieBadge = song.movie ? `<span class="movie-tag">🎬 Phim: ${song.movie}</span>` : '';
                item.innerHTML = `<div class="rank">${song.rank}</div><div class="song-info"><div class="title">${song.title}</div><div class="artist">${song.artist} ${movieBadge}</div></div>`;
                listContainer.appendChild(item);
            });
        }

        function playSong(title, artist) {
            document.getElementById('player-title').innerText = `Đang phát Video gốc: ${title} - ${artist}`;
            
            // Tìm kiếm tự động video gốc chuẩn xác trên YouTube và phát
            const searchKeyword = encodeURIComponent(title + " " + artist + " official mv");
            document.getElementById('player-youtube').src = `https://www.youtube.com/embed?listType=search&list=${searchKeyword}&autoplay=1`;

            // Tự động tìm kiếm và nạp Lyric trực tiếp thông qua cổng Proxy mở chống chặn
            const lyricBox = document.getElementById('lyric-box');
            lyricBox.innerText = "Đang quét kho dữ liệu lấy lyric chữ gốc...";

            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(`https://music.163.com/api/search/get/web?s=${title} ${artist}&type=1&limit=1`);
            
            fetch(proxyUrl)
                .then(response => response.json())
                .then(data => {
                    const searchResult = JSON.parse(data.contents);
                    if(searchResult.result && searchResult.result.songs) {
                        const id = searchResult.result.songs[0].id;
                        fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(`https://music.163.com/api/song/lyric?os=pc&id=${id}&lv=-1`))
                            .then(r => r.json())
                            .then(d => {
                                const lyrData = JSON.parse(d.contents);
                                if(lyrData.lrc && lyrData.lrc.lyric) {
                                    lyricBox.innerText = lyrData.lrc.lyric.replace(/\[.*?\]/g, '').trim();
                                } else { lyricBox.innerText = "Bài hát này hiện chưa cập nhật file lời gốc."; }
                            });
                    } else { lyricBox.innerText = "Không tìm thấy lyric gốc."; }
                }).catch(() => { lyricBox.innerText = "Lỗi kết nối khi tải lời bài hát."; });
        }

        initSystem();
    </script>
</body>
</html>
