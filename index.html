<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending & OST Monitor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #1DB954; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #b3b3b3; margin-bottom: 25px; font-size: 14px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: #b3b3b3; margin: 15px 0 5px 5px; font-weight: bold; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 5px; background: #181818; border-radius: 8px; }
        .tab-btn { background: transparent; color: #b3b3b3; border: none; padding: 10px 18px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .tab-btn.active { background: #1DB954; color: white; }
        .music-layout { display: flex; gap: 20px; }
        .song-list { flex: 1.2; background: #181818; padding: 15px; border-radius: 8px; max-height: 550px; overflow-y: auto; }
        .lyric-box { flex: 1; background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #282828; white-space: pre-line; max-height: 550px; overflow-y: auto; font-size: 15px; line-height: 1.7; color: #e5e5e5; }
        .song-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #232323; cursor: pointer; }
        .song-item:hover { background: #282828; }
        .rank { font-size: 16px; font-weight: bold; margin-right: 15px; color: #1DB954; width: 25px; text-align: center; }
        .song-info { flex: 1; }
        .title { font-weight: bold; color: #fff; }
        .artist { font-size: 13px; color: #b3b3b3; }
        .movie-tag { font-size: 11px; background: #333; color: #1DB954; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        #player-container { margin-top: 25px; background: #181818; padding: 20px; border-radius: 8px; border-top: 2px solid #1DB954; text-align: center; }
        #player-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; }
        iframe { border: none; width: 100%; height: 450px; border-radius: 8px; background: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trending & OST Audio Stream</h1>
        <div class="subtitle">Hệ thống hoàn thiện • Tự động đồng bộ • Lời gốc 100%</div>
        
        <div class="section-title">Bảng Xếp Hạng Bài Hát (Top 10)</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('KR_HOT')">🇰🇷 Hàn Quốc (Melon Pop)</button>
            <button class="tab-btn" onclick="switchTab('KR_BALLAD')">🎙️ Hàn Quốc (Ballad)</button>
            <button class="tab-btn" onclick="switchTab('JP_HOT')">🇯🇵 Nhật Bản (Billboard)</button>
            <button class="tab-btn" onclick="switchTab('CN_HOT')">🇨🇳 Trung Quốc (QQ Music)</button>
        </div>

        <div class="section-title">Nhạc Phim Đang Hot (Top 10 OST)</div>
        <div class="tabs">
            <button class="tab-btn" onclick="switchTab('KR_OST')">🇰🇷 OST Hàn Quốc</button>
            <button class="tab-btn" onclick="switchTab('JP_OST')">🇯🇵 OST Nhật Bản</button>
            <button class="tab-btn" onclick="switchTab('CN_OST')">🇨🇳 OST Trung Quốc</button>
        </div>

        <div class="music-layout">
            <div class="song-list" id="song-list">Đang đồng bộ dữ liệu hoàn chỉnh từ Robot...</div>
            <div class="lyric-box" id="lyric-box">Chọn bài hát từ danh sách để xem lời gốc không dịch...</div>
        </div>

        <div id="player-container">
            <div id="player-title">Đang phát: Chưa chọn bài hát</div>
            <iframe id="player-youtube" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        let musicDatabase = {};

        function initSystem() {
            fetch('live-data.json?t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    musicDatabase = data;
                    renderSongs(musicDatabase['KR_HOT']);
                })
                .catch(() => {
                    document.getElementById('song-list').innerText = "Hệ thống đang chuẩn bị cơ sở dữ liệu. Vui lòng nhấn Run Workflow trong mục Actions...";
                });
        }

        function switchTab(targetKey) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(musicDatabase[targetKey]) { renderSongs(musicDatabase[targetKey]); }
        }

        function renderSongs(songs) {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            if(!songs || songs.length === 0) {
                listContainer.innerText = "Bảng xếp hạng này hiện chưa có bài hát, đang chờ robot nạp...";
                return;
            }
            songs.forEach(song => {
                const item = document.createElement('div');
                item.className = 'song-item';
                item.onclick = () => playSong(song.title, song.artist, song.ytId, song.lyric);
                const movieBadge = song.movie ? `<span class="movie-tag">🎬 ${song.movie}</span>` : '';
                item.innerHTML = `<div class="rank">${song.rank}</div><div class="song-info"><div class="title">${song.title}</div><div class="artist">${song.artist} ${movieBadge}</div></div>`;
                listContainer.appendChild(item);
            });
        }

        function playSong(title, artist, ytId, lyric) {
            document.getElementById('player-title').innerText = `Đang phát: ${title} - ${artist}`;
            if(ytId) {
                document.getElementById('player-youtube').src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
            } else {
                const searchKeyword = encodeURIComponent(title + " " + artist);
                document.getElementById('player-youtube').src = `https://www.youtube.com/embed?listType=search&list=${searchKeyword}&autoplay=1`;
            }
            document.getElementById('lyric-box').innerText = lyric || "Chưa cập nhật dữ liệu lời bản địa cho bài hát này.";
        }

        initSystem();
    </script>
</body>
</html>
